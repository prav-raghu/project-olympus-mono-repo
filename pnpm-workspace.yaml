packages:
  - "apps/backend/*"
  - "apps/frontend/*"
  - "apps/mobile/*"
  # apps/cms is excluded — Directus runs as a Docker container, not a pnpm package
  - "common/*"
verifyDepsBeforeRun: false
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  bcrypt: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
