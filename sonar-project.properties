# SonarCloud/SonarQube Configuration
# For SonarCloud: https://sonarcloud.io
# For SonarQube: Your self-hosted instance

# Project identification
sonar.projectKey=your-org_node-mono-repo-template
sonar.organization=your-org

# Project metadata
sonar.projectName=Node Mono Repo Template
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=apps,common
sonar.tests=apps/**/tests,common/**/tests

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/.turbo/**,\
  **/.next/**,\
  **/public/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/*.config.ts,\
  **/jest.preset.js,\
  **/*.d.ts,\
  **/migrations/**,\
  **/generated/**

# Test exclusions
sonar.test.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.config.*

# Test inclusions
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/tests/**/*.ts

# Coverage
sonar.javascript.lcov.reportPaths=\
  apps/backend/api-gateway/coverage/lcov.info,\
  apps/backend/customer-api/coverage/lcov.info,\
  apps/backend/admin-api/coverage/lcov.info,\
  apps/backend/schedule-api/coverage/lcov.info,\
  common/*/coverage/lcov.info

# TypeScript configuration
sonar.typescript.tsconfigPaths=\
  apps/backend/api-gateway/tsconfig.json,\
  apps/backend/customer-api/tsconfig.json,\
  apps/backend/admin-api/tsconfig.json,\
  apps/backend/schedule-api/tsconfig.json,\
  apps/frontend/admin-web/tsconfig.json,\
  apps/frontend/customer-web/tsconfig.json,\
  common/cache/tsconfig.json,\
  common/config/tsconfig.json,\
  common/database/tsconfig.json,\
  common/email/tsconfig.json,\
  common/export/tsconfig.json,\
  common/logging/tsconfig.json,\
  common/metrics/tsconfig.json,\
  common/queue/tsconfig.json,\
  common/storage/tsconfig.json,\
  common/types/tsconfig.json,\
  common/utilities/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gates - customize thresholds
# sonar.qualitygate.wait=true

# Monorepo module configuration (optional - for separate dashboards per service)
# Uncomment and configure if you want separate analysis per module
# sonar.modules=api-gateway,customer-api,admin-api,schedule-api

# api-gateway.sonar.projectName=API Gateway
# api-gateway.sonar.sources=apps/backend/api-gateway/src
# api-gateway.sonar.tests=apps/backend/api-gateway/tests

# customer-api.sonar.projectName=Customer API
# customer-api.sonar.sources=apps/backend/customer-api/src
# customer-api.sonar.tests=apps/backend/customer-api/tests

# admin-api.sonar.projectName=Admin API
# admin-api.sonar.sources=apps/backend/admin-api/src
# admin-api.sonar.tests=apps/backend/admin-api/tests

# schedule-api.sonar.projectName=Schedule API
# schedule-api.sonar.sources=apps/backend/schedule-api/src
# schedule-api.sonar.tests=apps/backend/schedule-api/tests
