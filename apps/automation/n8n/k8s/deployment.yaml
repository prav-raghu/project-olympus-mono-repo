# =============================================================================
# n8n Deployment
# =============================================================================
# Kubernetes deployment for n8n workflow automation
# Replace <PROJECT_SLUG> with your project identifier
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
    name: n8n
    namespace: <PROJECT_SLUG>
    labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n-<PROJECT_SLUG>
        app.kubernetes.io/component: automation
        app.kubernetes.io/version: "latest"
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app.kubernetes.io/name: n8n
            app.kubernetes.io/instance: n8n-<PROJECT_SLUG>
    template:
        metadata:
            labels:
                app.kubernetes.io/name: n8n
                app.kubernetes.io/instance: n8n-<PROJECT_SLUG>
                app.kubernetes.io/component: automation
            annotations:
                prometheus.io/scrape: "true"
                prometheus.io/port: "5678"
                prometheus.io/path: "/metrics"
        spec:
            securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000

            containers:
                - name: n8n
                  image: n8nio/n8n:latest
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 5678
                        protocol: TCP

                  envFrom:
                      - configMapRef:
                            name: n8n-config

                  env:
                      # Database connection from secrets
                      - name: DB_POSTGRESDB_HOST
                        valueFrom:
                            secretKeyRef:
                                name: n8n-db-credentials
                                key: host
                      - name: DB_POSTGRESDB_DATABASE
                        valueFrom:
                            secretKeyRef:
                                name: n8n-db-credentials
                                key: database
                      - name: DB_POSTGRESDB_USER
                        valueFrom:
                            secretKeyRef:
                                name: n8n-db-credentials
                                key: username
                      - name: DB_POSTGRESDB_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: n8n-secrets
                                key: DB_POSTGRESDB_PASSWORD

                      # Encryption key (CRITICAL - must be unique per project)
                      - name: N8N_ENCRYPTION_KEY
                        valueFrom:
                            secretKeyRef:
                                name: n8n-secrets
                                key: N8N_ENCRYPTION_KEY

                      # Basic auth credentials
                      - name: N8N_BASIC_AUTH_USER
                        valueFrom:
                            secretKeyRef:
                                name: n8n-secrets
                                key: N8N_BASIC_AUTH_USER
                      - name: N8N_BASIC_AUTH_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: n8n-secrets
                                key: N8N_BASIC_AUTH_PASSWORD

                  volumeMounts:
                      - name: n8n-data
                        mountPath: /home/node/.n8n

                  resources:
                      requests:
                          cpu: "250m"
                          memory: "512Mi"
                      limits:
                          cpu: "1000m"
                          memory: "2Gi"

                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3

                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: false
                      capabilities:
                          drop:
                              - ALL

            volumes:
                - name: n8n-data
                  persistentVolumeClaim:
                      claimName: n8n-data

            nodeSelector: {}
            tolerations: []
            affinity: {}
