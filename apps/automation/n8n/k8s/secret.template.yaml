# =============================================================================
# n8n Secrets Template
# =============================================================================
# IMPORTANT: This is a template. Do NOT commit actual secrets to git.
#
# Usage:
#   1. Copy this file and remove .template suffix
#   2. Base64 encode your values: echo -n 'your-value' | base64
#   3. Replace all <BASE64_ENCODED_*> placeholders
#   4. Apply: kubectl apply -f secret.yaml -n <PROJECT_SLUG>
#
# For production, use external secret management:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault
#   - Azure Key Vault
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
    name: n8n-secrets
    namespace: <PROJECT_SLUG>
    labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n-<PROJECT_SLUG>
        app.kubernetes.io/component: automation
type: Opaque
data:
    # CRITICAL: Generate unique key per project
    # Command: openssl rand -hex 32 | base64
    N8N_ENCRYPTION_KEY: <BASE64_ENCODED_ENCRYPTION_KEY>

    # Database credentials
    # Command: echo -n 'your-password' | base64
    DB_POSTGRESDB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>

    # Basic auth (if enabled)
    N8N_BASIC_AUTH_USER: <BASE64_ENCODED_ADMIN_USER>
    N8N_BASIC_AUTH_PASSWORD: <BASE64_ENCODED_ADMIN_PASSWORD>

---
# =============================================================================
# Database Connection Secret (for external PostgreSQL)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
    name: n8n-db-credentials
    namespace: <PROJECT_SLUG>
    labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n-<PROJECT_SLUG>
type: Opaque
stringData:
    # Use stringData for easier templating (auto base64 encoded)
    # Replace with actual values or use external secrets operator
    host: "postgres.database.svc.cluster.local"
    port: "5432"
    database: "n8n_<PROJECT_SLUG_UNDERSCORE>"
    username: "n8n_<PROJECT_SLUG_UNDERSCORE>"
    # password should be in the main secret above
