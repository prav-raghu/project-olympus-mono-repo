services:
  api-gateway:
    build:
      context: ..
      dockerfile: dev-ops/docker/api-gateway.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY}
      - DATABASE_URL_ADMIN=${DATABASE_URL_ADMIN}
      - DATABASE_URL_CUSTOMER=${DATABASE_URL_CUSTOMER}
      - DATABASE_URL_SCHEDULE=${DATABASE_URL_SCHEDULE}
      - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
      - REDIS_URL=redis://redis:6379
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    depends_on:
      customer-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      schedule-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  customer-api:
    build:
      context: ..
      dockerfile: dev-ops/docker/customer-api.Dockerfile
    expose:
      - "4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY}
      - DATABASE_URL_CUSTOMER=${DATABASE_URL_CUSTOMER}
      - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
      - REDIS_URL=redis://redis:6379
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  admin-api:
    build:
      context: ..
      dockerfile: dev-ops/docker/admin-api.Dockerfile
    expose:
      - "4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY}
      - DATABASE_URL_ADMIN=${DATABASE_URL_ADMIN}
      - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
      - REDIS_URL=redis://redis:6379
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  schedule-api:
    build:
      context: ..
      dockerfile: dev-ops/docker/schedule-api.Dockerfile
    expose:
      - "4003"
    environment:
      - NODE_ENV=production
      - PORT=4003
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
      - AZURE_AUTHORITY=${AZURE_AUTHORITY}
      - DATABASE_URL_SCHEDULE=${DATABASE_URL_SCHEDULE}
      - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
      - REDIS_URL=redis://redis:6379
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
