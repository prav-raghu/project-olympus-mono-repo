apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-olympus-api-gateway
  labels:
    app: project-olympus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: project-olympus
      tier: api-gateway
  template:
    metadata:
      labels:
        app: project-olympus
        tier: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-docker-repo/project-olympus-api-gateway:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: DATABASE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: database-url-admin
            - name: DATABASE_URL_CUSTOMER
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: database-url-customer
            - name: DATABASE_URL_SCHEDULE
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: database-url-schedule
            - name: DATABASE_URL_SHARED
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: database-url-shared
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: azure-tenant-id
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: azure-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: azure-client-secret
            - name: AZURE_API_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: azure-api-audience
            - name: AZURE_AUTHORITY
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: azure-authority
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: project-olympus-api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 4000
  selector:
    app: project-olympus
    tier: api-gateway
