apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-olympus-api-gateway
  labels:
    app: project-olympus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: project-olympus
      tier: api-gateway
  template:
    metadata:
      labels:
        app: project-olympus
        tier: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-docker-repo/project-olympus-api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: url
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: project-olympus-api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: project-olympus
    tier: api-gateway