apiVersion: apps/v1
kind: Deployment
metadata:
  name: schedule-api
  labels:
    app: schedule-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: schedule-api
  template:
    metadata:
      labels:
        app: schedule-api
    spec:
      containers:
        - name: schedule-api
          image: your-docker-repo/schedule-api:latest
          ports:
            - containerPort: 4003
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4003"
            - name: DATABASE_URL_SCHEDULE
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: database-url-schedule
            - name: DATABASE_URL_SHARED
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: database-url-shared
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: azure-tenant-id
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: azure-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: azure-client-secret
            - name: AZURE_API_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: azure-api-audience
            - name: AZURE_AUTHORITY
              valueFrom:
                secretKeyRef:
                  name: schedule-api-secrets
                  key: azure-authority
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: schedule-api
spec:
  type: ClusterIP
  ports:
    - port: 4003
      targetPort: 4003
  selector:
    app: schedule-api
