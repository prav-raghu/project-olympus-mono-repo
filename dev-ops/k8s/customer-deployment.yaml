apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  labels:
    app: customer-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-api
  template:
    metadata:
      labels:
        app: customer-api
    spec:
      containers:
        - name: customer-api
          image: your-docker-repo/customer-api:latest
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4002"
            - name: DATABASE_URL_CUSTOMER
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: database-url-customer
            - name: DATABASE_URL_SHARED
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: database-url-shared
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: azure-tenant-id
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: azure-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: azure-client-secret
            - name: AZURE_API_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: azure-api-audience
            - name: AZURE_AUTHORITY
              valueFrom:
                secretKeyRef:
                  name: customer-api-secrets
                  key: azure-authority
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: customer-api
spec:
  type: ClusterIP
  ports:
    - port: 4002
      targetPort: 4002
  selector:
    app: customer-api
