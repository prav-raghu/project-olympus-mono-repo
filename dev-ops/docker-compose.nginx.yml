services:
    nginx:
        build:
            context: ../../infrastructure/nginx
            dockerfile: Dockerfile
        container_name: nginx-proxy
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ../../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ../../infrastructure/nginx/development.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_cache:/var/cache/nginx
            - certbot_www:/var/www/certbot:ro
            - certbot_conf:/etc/nginx/ssl:ro
        networks:
            - app-network
        depends_on:
            api-gateway:
                condition: service_healthy
            customer-web:
                condition: service_started
            admin-web:
                condition: service_started
        restart: unless-stopped

    api-gateway:
        build:
            context: ../../
            dockerfile: apps/backend/api-gateway/Dockerfile
        container_name: api-gateway
        expose:
            - "4000"
        environment:
            - NODE_ENV=production
            - PORT=4000
            - AZURE_TENANT_ID=${AZURE_TENANT_ID}
            - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
            - AZURE_AUTHORITY=${AZURE_AUTHORITY}
            - DATABASE_URL_ADMIN=${DATABASE_URL_ADMIN}
            - DATABASE_URL_CUSTOMER=${DATABASE_URL_CUSTOMER}
            - DATABASE_URL_SCHEDULE=${DATABASE_URL_SCHEDULE}
            - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
        networks:
            - app-network
        depends_on:
            customer-api:
                condition: service_healthy
            admin-api:
                condition: service_healthy
            schedule-api:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    customer-api:
        build:
            context: ../../
            dockerfile: apps/backend/customer-api/Dockerfile
        container_name: customer-api
        expose:
            - "4002"
        environment:
            - NODE_ENV=production
            - PORT=4002
            - AZURE_TENANT_ID=${AZURE_TENANT_ID}
            - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
            - AZURE_AUTHORITY=${AZURE_AUTHORITY}
            - DATABASE_URL_CUSTOMER=${DATABASE_URL_CUSTOMER}
            - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
            - CUSTOMER_WEB_URL=${CUSTOMER_WEB_URL}
        networks:
            - app-network
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    admin-api:
        build:
            context: ../../
            dockerfile: apps/backend/admin-api/Dockerfile
        container_name: admin-api
        expose:
            - "4001"
        environment:
            - NODE_ENV=production
            - PORT=4001
            - AZURE_TENANT_ID=${AZURE_TENANT_ID}
            - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
            - AZURE_AUTHORITY=${AZURE_AUTHORITY}
            - DATABASE_URL_ADMIN=${DATABASE_URL_ADMIN}
            - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
            - ADMIN_WEB_URL=${ADMIN_WEB_URL}
        networks:
            - app-network
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    schedule-api:
        build:
            context: ../../
            dockerfile: apps/backend/schedule-api/Dockerfile
        container_name: schedule-api
        expose:
            - "4003"
        environment:
            - NODE_ENV=production
            - PORT=4003
            - AZURE_TENANT_ID=${AZURE_TENANT_ID}
            - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            - AZURE_API_AUDIENCE=${AZURE_API_AUDIENCE}
            - AZURE_AUTHORITY=${AZURE_AUTHORITY}
            - DATABASE_URL_SCHEDULE=${DATABASE_URL_SCHEDULE}
            - DATABASE_URL_SHARED=${DATABASE_URL_SHARED}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
        networks:
            - app-network
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    customer-web:
        build:
            context: ../../apps/frontend/customer-web
            dockerfile: Dockerfile
        container_name: customer-web
        expose:
            - "5173"
        environment:
            - API_BASE_URL=http://localhost/api
        networks:
            - app-network
        restart: unless-stopped

    admin-web:
        build:
            context: ../../apps/frontend/admin-web
            dockerfile: Dockerfile
        container_name: admin-web
        expose:
            - "4200"
        environment:
            - VITE_API_URL=http://localhost/api
        networks:
            - app-network
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
            - ../mysql-init:/docker-entrypoint-initdb.d
        networks:
            - app-network
        expose:
            - "3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
        networks:
            - app-network
        expose:
            - "6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    certbot:
        image: certbot/certbot
        container_name: certbot
        volumes:
            - certbot_www:/var/www/certbot
            - certbot_conf:/etc/letsencrypt
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
    app-network:
        driver: bridge

volumes:
    mysql_data:
    redis_data:
    nginx_cache:
    certbot_www:
    certbot_conf:
