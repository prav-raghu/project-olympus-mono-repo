services:
    nginx:
        build:
            context: ../../infrastructure/nginx
            dockerfile: Dockerfile
        container_name: nginx-proxy
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ../../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ../../infrastructure/nginx/development.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_cache:/var/cache/nginx
            - certbot_www:/var/www/certbot:ro
            - certbot_conf:/etc/nginx/ssl:ro
        networks:
            - app-network
        depends_on:
            api-gateway:
                condition: service_healthy
            customer-web:
                condition: service_started
            admin-web:
                condition: service_started
        restart: unless-stopped

    api-gateway:
        build:
            context: ../../
            dockerfile: dev-ops/docker/api-gateway.Dockerfile
        container_name: api-gateway
        expose:
            - "3000"
        environment:
            - NODE_ENV=production
            - JWT_SECRET=${JWT_SECRET}
            - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
        networks:
            - app-network
        depends_on:
            customer-api:
                condition: service_healthy
            admin-api:
                condition: service_healthy
            schedule-api:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    customer-api:
        build:
            context: ../../
            dockerfile: dev-ops/docker/customer-api.Dockerfile
        container_name: customer-api
        expose:
            - "3001"
        environment:
            - NODE_ENV=production
            - DATABASE_URL=${DATABASE_URL}
            - JWT_SECRET=${JWT_SECRET}
            - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
            - CUSTOMER_WEB_URL=${CUSTOMER_WEB_URL}
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ping || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    admin-api:
        build:
            context: ../../
            dockerfile: dev-ops/docker/admin-api.Dockerfile
        container_name: admin-api
        expose:
            - "3002"
        environment:
            - NODE_ENV=production
            - DATABASE_URL=${DATABASE_URL}
            - JWT_SECRET=${JWT_SECRET}
            - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - CORS_ORIGIN=${CORS_ORIGIN}
            - ADMIN_WEB_URL=${ADMIN_WEB_URL}
            - PASSWORD_RESET_EXPIRATION_MINUTES=${PASSWORD_RESET_EXPIRATION_MINUTES:-60}
            - TWO_FACTOR_ENCRYPTION_KEY=${TWO_FACTOR_ENCRYPTION_KEY}
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ping || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    schedule-api:
        build:
            context: ../../
            dockerfile: dev-ops/docker/schedule-api.Dockerfile
        container_name: schedule-api
        expose:
            - "3003"
        environment:
            - NODE_ENV=production
            - DATABASE_URL=${DATABASE_URL}
            - JWT_SECRET=${JWT_SECRET}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - SCHEDULE_API_KEY=${SCHEDULE_API_KEY}
            - CORS_ORIGIN=${CORS_ORIGIN}
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3003/ping || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    customer-web:
        build:
            context: ../../apps/frontend/customer-web
            dockerfile: Dockerfile
        container_name: customer-web
        expose:
            - "3000"
        environment:
            - API_BASE_URL=http://localhost/api
        networks:
            - app-network
        restart: unless-stopped

    admin-web:
        build:
            context: ../../apps/frontend/admin-web
            dockerfile: Dockerfile
        container_name: admin-web
        expose:
            - "5174"
        environment:
            - VITE_API_URL=http://localhost/api
        networks:
            - app-network
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        expose:
            - "5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
        networks:
            - app-network
        expose:
            - "6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    certbot:
        image: certbot/certbot
        container_name: certbot
        volumes:
            - certbot_www:/var/www/certbot
            - certbot_conf:/etc/letsencrypt
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
    nginx_cache:
    certbot_www:
    certbot_conf:
